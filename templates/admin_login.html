<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>V-LLATS | Admin Login</title>

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:#eef3ff;

            overflow:hidden;

            position:relative;

            padding:20px;
        }

        /* LOGIN CARD */

        .login-container{

            width:100%;

            max-width:500px;

            background:white;

            border-radius:30px;

            padding:55px;

            box-shadow:
                0 20px 50px rgba(0,0,0,0.08);

            position:relative;

            z-index:1;

            animation:fadeIn 0.5s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{

            text-align:center;

            margin-bottom:12px;
        }

        .logo h1{

            font-size:54px;

            color:#2563eb;

            font-weight:700;

            letter-spacing:1px;
        }

        .subtitle{

            text-align:center;

            font-size:34px;

            font-weight:700;

            color:#111827;

            margin-bottom:40px;
        }

        .input-group{

            margin-bottom:24px;
        }

        .input-group label{

            display:block;

            margin-bottom:10px;

            font-size:15px;

            font-weight:600;

            color:#1f2937;
        }

        .input-group input{

            width:100%;

            padding:18px;

            border:1px solid #d6dbe7;

            border-radius:16px;

            font-size:15px;

            transition:0.3s ease;

            outline:none;
        }

        .input-group input:focus{

            border-color:#2563eb;

            box-shadow:0 0 0 4px rgba(37,99,235,0.10);
        }

        .login-btn{

            width:100%;

            padding:18px;

            border:none;

            border-radius:16px;

            background:linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s ease;

            margin-top:10px;
        }

        .login-btn:hover{

            transform:translateY(-2px);

            box-shadow:0 12px 25px rgba(37,99,235,0.25);
        }

        /* ERROR POPUP */

        .toast-message{

            position:fixed;

            bottom:30px;

            left:50%;

            transform:translateX(-50%);

            background:#dc3545;

            color:white;

            padding:14px 24px;

            border-radius:12px;

            font-size:15px;

            font-weight:500;

            box-shadow:0 10px 25px rgba(0,0,0,0.15);

            animation:fadeOut 3s forwards;

            z-index:9999;
        }

        @keyframes fadeOut{

            0%{
                opacity:1;
            }

            80%{
                opacity:1;
            }

            100%{
                opacity:0;
                visibility:hidden;
            }
        }

        @media(max-width:600px){

            .login-container{

                padding:40px 30px;
            }

            .logo h1{

                font-size:42px;
            }

            .subtitle{

                font-size:28px;
            }
        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="logo">

            <h1>V-LLATS</h1>

        </div>

        <div class="subtitle">

            Admin Login Portal

        </div>

        <form method="POST">

            <div class="input-group">

                <label>Username</label>

                <input type="text"
                       name="username"
                       placeholder="Enter admin username"
                       required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input type="password"
                       name="password"
                       placeholder="Enter admin password"
                       required>

            </div>

            <button type="submit"
                    class="login-btn">

                Login

            </button>

        </form>

    </div>

    {% if error %}

    <div class="toast-message">

        {{ error }}

    </div>

    {% endif %}

</body>

</html>
