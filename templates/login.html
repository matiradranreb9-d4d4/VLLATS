<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>V-LLATS | Student Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#eef3ff;
            overflow:hidden;
            position:relative;
        }


        /* LOGIN CARD */

        .login-container{
            width:500px;
            background:white;
            border-radius:28px;
            padding:60px;
            box-shadow:0 20px 50px rgba(0,0,0,0.08);
            position:relative;
            z-index:1;
            animation:fadeIn 0.6s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{
            text-align:center;
            margin-bottom:15px;
        }

        .logo h1{
            font-size:52px;
            color:#1565ff;
            font-weight:700;
            letter-spacing:1px;
        }

        .subtitle{
            text-align:center;
            font-weight:800;
            font-size:32px;
            line-height:1.5;
        }

        .input-group{
            margin-bottom:25px;
        }

        .input-group label{
            display:block;
            margin-bottom:10px;
            font-size:15px;
            font-weight:600;
            color:#222;
        }

        .input-group input{
            width:100%;
            padding:18px;
            border:1px solid #d6dbe7;
            border-radius:14px;
            font-size:15px;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#1565ff;
            box-shadow:0 0 0 4px rgba(21,101,255,0.1);
        }

        .login-btn{
            width:100%;
            padding:18px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg, #1565ff, #0d47c9);
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 12px 25px rgba(21,101,255,0.25);
        }

        .back-link{
            display:block;
            text-align:center;
            margin-top:28px;
            text-decoration:none;
            color:#1565ff;
            font-weight:500;
            transition:0.3s;
        }

        .back-link:hover{
            opacity:0.8;
        }

        .toast-message{

            position:fixed;

            bottom:30px;

            left:50%;

            transform:translateX(-50%);

            background:#dc3545;

            color:white;

            padding:14px 24px;

            border-radius:12px;

            font-size:15px;

            font-weight:500;

            box-shadow:0 10px 25px rgba(0,0,0,0.15);

            animation:fadeOut 3s forwards;

            z-index:9999;
        }

        @keyframes fadeOut{

            0%{
                opacity:1;
            }

            80%{
                opacity:1;
            }

            100%{
                opacity:0;
                visibility:hidden;
            }
        }

        @media(max-width:600px){

            .login-container{
                width:90%;
                padding:40px 30px;
            }

            .logo h1{
                font-size:42px;
            }

        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="logo">
            <h1>V-LLATS</h1>
        </div>

        <p class="subtitle">
            Student Login Portal
        </p>

        <form method="POST">

            <div class="input-group">

                <label>SR-Code</label>

                <input
                    type="text"
                    name="sr_code"
                    placeholder="Enter your SR-Code"
                    required
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >

            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <a href="/" class="back-link">
            ← Back to Homepage
        </a>

    </div>

{% if error %}
<div class="toast-message">
    {{ error }}
</div>
{% endif %}

</body>

</html>
